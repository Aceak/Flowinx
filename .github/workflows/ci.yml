name: Validate

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check package lock
        run: |
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json changed after npm ci."
            exit 1
          }

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Format check
        run: npm run format:check --if-present

      - name: Test
        run: npm test --if-present

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Check dist
        run: |
          test -d dist && test -n "$(ls -A dist)" || {
            echo "::error::dist directory is missing or empty."
            exit 1
          }
